<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days in History</title>
  <meta name="description" content="One fascinating historical event each day — ancient worlds, medieval empires, early modern powers." />
  <meta property="og:title" content="Days in History" />
  <meta property="og:description" content="One fascinating historical event each day, tied to today's date." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://days-in-history.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="alternate" type="application/rss+xml" title="Days in History RSS" href="/api/feed" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:         #f4eed9;
      --bg-card:    #ede5c8;
      --bg-inner:   #e8deba;
      --text:       #342015;
      --text-mid:   #6b4c2f;
      --text-muted: #9a7555;
      --accent:     #7a4520;
      --accent-warm:#c47a38;
      --border:     #c9b48a;
      --shadow:     rgba(70, 40, 10, 0.10);
      --radius:     14px;
      --font:       'EB Garamond', Georgia, 'Times New Roman', serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #18140c;
        --bg-card:    #221c10;
        --bg-inner:   #2a2214;
        --text:       #e8dcbe;
        --text-mid:   #b09060;
        --text-muted: #7a6040;
        --accent:     #d4924a;
        --accent-warm:#e0aa66;
        --border:     #3c3018;
        --shadow:     rgba(0, 0, 0, 0.35);
      }
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 18px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.65;
      min-height: 100vh;
      padding: 2.5rem 1.25rem 3rem;
    }

    /* ── Layout ── */
    main {
      max-width: 660px;
      margin: 0 auto;
    }

    /* ── Site header ── */
    .site-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .site-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin-bottom: 0.5rem;
      opacity: 0.85;
      filter: drop-shadow(0 2px 6px var(--shadow));
    }

    @media (prefers-color-scheme: dark) {
      .site-logo { filter: invert(0.88) drop-shadow(0 2px 6px var(--shadow)); }
    }

    .site-title {
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .site-date {
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text);
      margin-top: 0.3rem;
    }

    /* ── Event card ── */
    .event-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.25rem 2.5rem 2rem;
      box-shadow: 0 6px 28px var(--shadow);
      position: relative;
      animation: fadeInUp 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Category strip (icon + meta) ── */
    .event-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .category-icon {
      width: 28px;
      height: 28px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .category-icon svg {
      width: 100%;
      height: 100%;
    }

    .year-badge {
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--bg-inner);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.2em 0.65em;
    }

    .category-label {
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .region-label {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-left: auto;
      font-style: italic;
    }

    /* ── Headline ── */
    .headline {
      font-size: 1.85rem;
      font-weight: 500;
      line-height: 1.28;
      color: var(--text);
      margin-bottom: 1.1rem;
    }

    /* ── Summary ── */
    .summary {
      font-size: 1.08rem;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 1.75rem;
    }

    /* ── Divider ── */
    .ornament {
      text-align: center;
      color: var(--border);
      letter-spacing: 0.5em;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      user-select: none;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn {
      font-family: var(--font);
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 8px;
      padding: 0.5em 1.2em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      border: 1px solid var(--border);
    }

    .btn-share {
      background: var(--bg-inner);
      color: var(--text);
    }

    .btn-share:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-share.copied {
      background: #4a7c4e;
      color: #fff;
      border-color: #4a7c4e;
    }

    .rss-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      margin-left: auto;
    }

    .rss-link:hover { color: var(--accent); }

    /* ── Loading ── */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4rem 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-card {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
      font-style: italic;
      font-size: 1.05rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* ── Footer ── */
    footer {
      margin-top: 2.75rem;
      text-align: center;
      font-size: 0.83rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    footer a {
      color: var(--accent-warm);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Hidden helper ── */
    .hidden { display: none !important; }

    /* ── Responsive tweaks ── */
    @media (max-width: 480px) {
      html { font-size: 16px; }
      .event-card { padding: 1.6rem 1.4rem 1.5rem; }
      .headline { font-size: 1.55rem; }
      .region-label { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <header class="site-header">
      <img src="/header-logo.png" alt="" class="site-logo" />
      <p class="site-title">Days in History</p>
      <p class="site-date" id="site-date">— — —</p>
    </header>

    <!-- Loading state -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <!-- Event card (hidden until loaded) -->
    <div id="event-card" class="event-card hidden">
      <div class="event-meta">
        <span class="category-icon" id="category-icon"></span>
        <span class="year-badge" id="year-badge"></span>
        <span class="category-label" id="category-label"></span>
        <span class="region-label" id="region-label"></span>
      </div>
      <h1 class="headline" id="headline"></h1>
      <div class="ornament">· · ·</div>
      <p class="summary" id="summary"></p>
      <div class="actions">
        <button class="btn btn-share" id="share-btn" onclick="shareEvent()">Share</button>
        <a class="rss-link" href="/api/feed" title="RSS Feed">RSS ↗</a>
      </div>
    </div>

    <!-- Error state -->
    <div id="error-card" class="error-card hidden">
      <p id="error-message">Content is being prepared. Check back in a moment.</p>
    </div>

    <footer>
      Curated by Ziggurat &nbsp;|&nbsp; Powered by <a href="https://hiro.report" target="_blank" rel="noopener">Hiro</a>
    </footer>
  </main>

  <script>
    // ── Inline SVG icons (avoids extra network round-trip) ──
    const ICONS = {
      warfare: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/><polyline points="4,4 4,10 10,4"/><polyline points="20,20 14,20 20,14"/></svg>`,
      politics: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18 L5 9 L9 14 L12 5 L15 14 L19 9 L22 18 Z"/><line x1="2" y1="18" x2="22" y2="18"/></svg>`,
      religion: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11 Q12 2 21 11"/><rect x="3" y="11" width="18" height="2"/><line x1="7" y1="13" x2="7" y2="21"/><line x1="12" y1="13" x2="12" y2="21"/><line x1="17" y1="13" x2="17" y2="21"/><line x1="3" y1="21" x2="21" y2="21"/></svg>`,
      science:  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg>`,
      arts:     `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3 C4 5 3 9 3 12 C3 17.5 7 22 12 22 C17 22 21 17.5 21 12 C21 9 20 5 17 3"/><line x1="7" y1="3" x2="17" y2="3"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="12" y1="3" x2="12" y2="22"/><line x1="15" y1="3" x2="15" y2="18"/></svg>`,
      exploration: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17 L5 13 L19 13 L21 17 Z"/><path d="M5 13 L6 8 L18 8 L19 13"/><line x1="12" y1="2" x2="12" y2="8"/><path d="M12 2 L17.5 7 L12 8 Z"/><line x1="2" y1="20" x2="22" y2="20"/></svg>`,
      trade:    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="21"/><line x1="5" y1="7" x2="19" y2="7"/><path d="M5 7 L2 13 C2 15 3.8 16.5 6 16.5 C8.2 16.5 10 15 10 13 Z"/><path d="M19 7 L22 13 C22 15 20.2 16.5 18 16.5 C15.8 16.5 14 15 14 13 Z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>`,
      architecture: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="18" height="3" rx="1"/><rect x="3" y="19" width="18" height="3" rx="1"/><line x1="7" y1="5" x2="7" y2="19"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="17" y1="5" x2="17" y2="19"/></svg>`
    };

    const REGION_LABELS = {
      europe:      'Europe',
      middle_east: 'Middle East',
      east_asia:   'East Asia',
      south_asia:  'South Asia'
    };

    const MONTH_NAMES = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];

    function formatYear(year) {
      if (typeof year !== 'number') return String(year);
      return year < 0 ? `${Math.abs(year)} BCE` : `${year} CE`;
    }

    function getDateKey() {
      const params = new URLSearchParams(window.location.search);
      return params.get('date') || null;
    }

    function setDisplayDate(dateKey) {
      const el = document.getElementById('site-date');
      if (dateKey && /^\d{4}$/.test(dateKey)) {
        const month = parseInt(dateKey.slice(0, 2), 10) - 1;
        const day   = parseInt(dateKey.slice(2, 4), 10);
        el.textContent = `${MONTH_NAMES[month]} ${day}`;
      } else {
        const now = new Date();
        el.textContent = `${MONTH_NAMES[now.getMonth()]} ${now.getDate()}`;
      }
    }

    function showEvent(data) {
      document.getElementById('headline').textContent   = data.headline ?? '';
      document.getElementById('summary').textContent    = data.summary  ?? '';
      document.getElementById('year-badge').textContent = formatYear(data.year);

      const cat = (data.category ?? '').toLowerCase();
      document.getElementById('category-icon').innerHTML = ICONS[cat] ?? '';
      document.getElementById('category-label').textContent =
        cat.charAt(0).toUpperCase() + cat.slice(1);

      const reg = (data.region ?? '').toLowerCase();
      document.getElementById('region-label').textContent = REGION_LABELS[reg] ?? reg;

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('event-card').classList.remove('hidden');
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-message').textContent = msg;
      document.getElementById('error-card').classList.remove('hidden');
    }

    async function loadEvent() {
      const dateKey = getDateKey();
      setDisplayDate(dateKey);

      const url = dateKey ? `/api/today?date=${dateKey}` : '/api/today';
      try {
        const res  = await fetch(url);
        const data = await res.json();
        if (!res.ok) {
          showError(data.message ?? 'Content is being prepared. Check back soon.');
          return;
        }
        showEvent(data);
      } catch (err) {
        showError('Unable to load today\'s event. Please try again later.');
      }
    }

    function shareEvent() {
      const url = window.location.href.includes('?')
        ? window.location.href
        : `${window.location.href}?date=${getCurrentMmdd()}`;

      const btn = document.getElementById('share-btn');
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Share';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Share'; }, 2000);
      });
    }

    function getCurrentMmdd() {
      const now = new Date();
      const mm  = String(now.getMonth() + 1).padStart(2, '0');
      const dd  = String(now.getDate()).padStart(2, '0');
      return `${mm}${dd}`;
    }

    loadEvent();
  </script>
</body>
</html>
